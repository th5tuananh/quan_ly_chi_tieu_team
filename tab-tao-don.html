<div id="tab-tao-don" class="tab-content">
  <div class="glass-card rounded-2xl soft-shadow p-5 md:p-8 max-w-2xl mx-auto bg-white">
    <h2 class="text-xl font-bold text-surface-900 mx-1 mb-6 flex items-center">
      <svg class="w-6 h-6 mr-2 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
      Tạo Giao Dịch
    </h2>

    <form id="form-new-tx" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-semibold text-surface-700 mb-1.5">Người đứng ra trả tiền</label>
          <select id="tx-payer" class="w-full touch-target bg-surface-50 border border-surface-200 text-surface-900 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 pl-3 pr-8 transition outline-none" required>
            <option value="">-- Chọn --</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-surface-700 mb-1.5">Ngày mua</label>
          <input type="date" id="tx-date" class="w-full touch-target bg-surface-50 border border-surface-200 text-surface-900 rounded-xl px-3 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition outline-none" required>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-surface-700 mb-1.5">Mô tả (Món gì, ở đâu?)</label>
        <input type="text" id="tx-desc" placeholder="VD: Trà sữa Phúc Long, Cơm trưa..." class="w-full touch-target bg-surface-50 border border-surface-200 text-surface-900 rounded-xl px-3 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition outline-none" required>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-semibold text-surface-700 mb-2">Nguồn đặt</label>
          <div class="flex flex-wrap gap-2 text-sm">
            <label class="cursor-pointer border-0 p-0 m-0 w-auto h-auto">
              <input type="radio" name="tx-source" value="Grab" class="peer sr-only">
              <div class="px-3 min-h-[36px] flex items-center justify-center rounded-lg border border-surface-200 bg-white text-surface-600 peer-checked:border-success-500 peer-checked:bg-success-50 peer-checked:text-success-700 peer-checked:font-medium transition pt-1 pb-1">Grab</div>
            </label>
            <label class="cursor-pointer border-0 p-0 m-0 w-auto h-auto">
              <input type="radio" name="tx-source" value="ShopeeFood" class="peer sr-only">
              <div class="px-3 min-h-[36px] flex items-center justify-center rounded-lg border border-surface-200 bg-white text-surface-600 peer-checked:border-warning-500 peer-checked:bg-warning-50 peer-checked:text-warning-700 peer-checked:font-medium transition pt-1 pb-1">ShopeeFood</div>
            </label>
            <label class="cursor-pointer border-0 p-0 m-0 w-auto h-auto">
              <input type="radio" name="tx-source" value="Bên ngoài" class="peer sr-only" checked>
              <div class="px-3 min-h-[36px] flex items-center justify-center rounded-lg border border-surface-200 bg-white text-surface-600 peer-checked:border-primary-500 peer-checked:bg-primary-50 peer-checked:text-primary-700 peer-checked:font-medium transition pt-1 pb-1">Bên ngoài</div>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-surface-700 mb-1.5">Tổng tiền bill (VNĐ)</label>
          <div class="relative">
            <input type="number" id="tx-total" defaultValue="0" min="0" class="w-full touch-target bg-surface-50 border border-surface-200 text-surface-900 rounded-xl pl-3 pr-10 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 font-bold text-xl tabular-nums text-right transition outline-none" required>
            <span class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none font-medium text-surface-500">đ</span>
          </div>
        </div>
      </div>

      <hr class="border-surface-100 my-2">

      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 bg-surface-50 p-3 rounded-xl border border-surface-100">
        <div class="flex items-center">
          <label class="inline-flex items-center cursor-pointer mr-4 min-h-[44px]">
            <input type="checkbox" id="tx-select-all" class="w-5 h-5 text-primary-600 border-surface-300 focus:ring-primary-500 rounded" checked>
            <span class="ml-2 font-semibold text-sm">Chọn tất cả</span>
          </label>
        </div>
        <div class="flex bg-surface-200/50 p-1 rounded-lg">
           <button type="button" id="mode-even" class="flex-1 px-4 py-2 text-sm rounded-md bg-white shadow-sm font-semibold text-surface-900 transition min-w-[90px]">Chia đều</button>
           <button type="button" id="mode-custom" class="flex-1 px-4 py-2 text-sm rounded-md text-surface-500 font-medium hover:text-surface-900 transition min-w-[90px]">Tùy chỉnh</button>
        </div>
      </div>

      <!-- Danh sách người chia -->
      <div id="split-list" class="space-y-2 mt-4">
        <!-- Split rows render here -->
      </div>

      <div id="custom-split-info" class="p-4 bg-primary-50 rounded-xl border border-primary-100 text-sm hidden flex-col sm:flex-row justify-between font-semibold gap-2 transition-all">
        <span class="text-primary-800 flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg> Tổng phụ: <span id="custom-subtotal" class="tabular-nums ml-1">0</span> đ</span>
        <span class="text-warning-600 flex items-center" id="custom-remaining-wrapper">
          Còn lệch: <span id="custom-remaining" class="tabular-nums shadow-sm rounded bg-white px-2 py-0.5 ml-2 border">0</span> đ
        </span>
      </div>

      <button type="submit" class="w-full bg-primary-600 text-white font-bold touch-target rounded-xl hover:bg-primary-700 active:scale-[0.98] transition-all shadow-md mt-6 border-0">
        Lưu Giao Dịch Này
      </button>
    </form>
  </div>
</div>
