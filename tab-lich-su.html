<div id="tab-lich-su" class="tab-content">
  <div class="glass-card p-4 rounded-2xl mb-6 flex flex-col md:flex-row gap-3 items-end bg-white">
    <div class="w-full md:flex-1 relative">
      <label class="block text-xs font-semibold text-surface-500 mb-1 ml-1">Tìm kiếm chi tiêu</label>
      <div class="relative">
        <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-surface-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" id="filter-search" placeholder="Tên món ăn..." class="w-full pl-9 pr-3 touch-target border border-surface-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 outline-none transition bg-surface-50">
      </div>
    </div>
    <div class="w-full md:w-1/4">
      <label class="block text-xs font-semibold text-surface-500 mb-1 ml-1">Nguồn đặt</label>
      <select id="filter-source" class="w-full touch-target px-3 border border-surface-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 outline-none transition bg-surface-50">
        <option value="">Tất cả</option>
        <option value="Grab">Grab</option>
        <option value="ShopeeFood">ShopeeFood</option>
        <option value="Bên ngoài">Bên ngoài</option>
        <option value="Khác">Khác</option>
      </select>
    </div>
    <div class="w-full md:w-auto">
      <button id="btn-refresh-history" class="w-full md:w-auto px-4 border border-surface-200 rounded-xl font-medium touch-target hover:bg-surface-50 flex items-center justify-center transition text-surface-700 bg-white">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Tải lại
      </button>
    </div>
    <div class="w-full md:w-auto">
      <button id="btn-export-csv" class="w-full md:w-auto px-4 border border-surface-200 rounded-xl font-medium touch-target hover:bg-surface-50 flex items-center justify-center transition text-surface-700 bg-white">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        Xuất CSV
      </button>
    </div>
  </div>

  <div id="history-list" class="space-y-4">
    <!-- TX Cards render here -->
  </div>
</div>

<!-- Batch Settlement Footer -->
<div id="batch-footer" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg hidden z-50">
  <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
    <span id="batch-count" class="text-sm font-medium text-gray-700">Đã chọn: 0 dòng</span>
    <button id="batch-confirm-btn" disabled
            onclick="submitBatchSettlement()"
            class="bg-green-500 hover:bg-green-600 text-white font-semibold px-5 py-2 rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
      Xác nhận đã trả (0)
    </button>
  </div>
</div>
